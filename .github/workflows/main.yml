name: Full CI/CD Pipeline

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest

    - name: Build Docker image
      run: docker build -t flask-demo .

    - name: Docker Hub Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Tag Docker image
      run: docker tag flask-demo ${{ secrets.DOCKER_USERNAME }}/flask-demo

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-demo

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        debug: true

        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/flask-demo

          docker stop flask-container || true
          docker rm flask-container || true

          docker run -d \
            --name flask-container \
            -p 5000:5000 \
            ${{ secrets.DOCKER_USERNAME }}/flask-demo
